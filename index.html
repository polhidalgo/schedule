<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule BJJ - Pol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Schedule semanal</h1>
      <span class="subtitle">BJJ / NoGi / Strength</span>
    </div>

    <div class="controls">
      <div class="plan-toggle" role="tablist" aria-label="Plan activo">
        <button class="plan-btn active" data-plan="A" role="tab" aria-selected="true">Plan A · Saludable</button>
        <button class="plan-btn" data-plan="B" role="tab" aria-selected="false">Plan B · Lesion</button>
      </div>

      <div class="filters" id="typeFilters" aria-label="Filtros de tipo"></div>

      <button class="reset-btn" id="resetBtn" title="Borrar todos los datos guardados">Reset</button>
    </div>
  </header>

  <main class="layout">
    <section class="week-grid" id="weekGrid" aria-label="Calendario semanal"></section>

    <aside class="sidebar">
      <div class="sidebar-section today-card" id="todayCard">
        <h2>Hoy</h2>
        <div id="todayContent"></div>
      </div>

      <div class="sidebar-section feedback-card">
        <h2>Como me siento hoy</h2>
        <form id="feedbackForm">
          <label class="slider-label">
            Energia <span id="energyVal" class="slider-val">3</span>/5
            <input type="range" id="energy" min="1" max="5" value="3" />
          </label>

          <label class="slider-label">
            Dolor rodilla <span id="painVal" class="slider-val">0</span>/5
            <input type="range" id="pain" min="0" max="5" value="0" />
          </label>

          <label class="slider-label">
            Sueno (horas) <span id="sleepVal" class="slider-val">7</span>h
            <input type="range" id="sleep" min="3" max="11" value="7" />
          </label>

          <label class="textarea-label">
            Notas
            <textarea id="notes" rows="3" placeholder="Como te encuentras, cambios, sensaciones..."></textarea>
          </label>

          <div class="suggestion" id="suggestion" hidden></div>

          <button type="submit" class="save-btn">Guardar</button>
        </form>
      </div>

      <div class="sidebar-section history-card">
        <h2>Historial</h2>
        <div id="history"></div>
      </div>
    </aside>
  </main>

  <!-- Modal sesion -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header>
        <h3 id="modalTitle"></h3>
        <button class="close-btn" id="modalClose" aria-label="Cerrar">&times;</button>
      </header>
      <div class="modal-body">
        <p class="modal-meta" id="modalMeta"></p>
        <p class="modal-note" id="modalNote"></p>

        <div class="status-buttons">
          <button class="status-btn" data-status="done">Hecho</button>
          <button class="status-btn" data-status="modified">Modificado</button>
          <button class="status-btn" data-status="skipped">Saltado</button>
          <button class="status-btn" data-status="">Limpiar</button>
        </div>

        <label class="textarea-label">
          Nota de la sesion
          <textarea id="sessionNote" rows="3" placeholder="Como fue, ajustes, etc."></textarea>
        </label>

        <button class="save-btn" id="saveSessionBtn">Guardar nota</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
